<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="title">포트폴리오 대시보드</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

<header>
  <div class="logo" id="logo">포트폴리오 <span>대시보드</span></div>
  <div class="header-controls">
    <div class="header-meta">
      <div id="exRateDisplay" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);background:rgba(0,212,170,0.1);padding:4px 10px;border-radius:6px;border:1px solid rgba(0,212,170,0.2);"></div>
      <span style="font-size:11px;color:var(--text3);" data-i18n="ai_sync"><span class="pulse"></span>AI 데이터 연동</span>
      <div class="htime" id="htime"></div>
    </div>
    <div class="header-actions">
      <div class="lang-switch">
        <div class="cur-label" style="font-size:9px;color:var(--text3);margin-right:4px;align-self:center;" data-i18n="display_currency">표시 통화</div>
        <button class="lang-btn active" id="cur-krw" onclick="setDisplayCurrency('KRW')">KRW</button>
        <button class="lang-btn" id="cur-usd" onclick="setDisplayCurrency('USD')">USD</button>
      </div>
      <div class="lang-switch">
        <button class="lang-btn active" id="lang-ko" onclick="changeLang('ko')">KO</button>
        <button class="lang-btn" id="lang-en" onclick="changeLang('en')">EN</button>
      </div>
      <button class="theme-btn" id="themeToggle" onclick="toggleTheme()" title="라이트/다크 모드"></button>
      <div id="loginArea"></div>
    </div>
  </div>
</header>

<!-- Summary Cards -->
<div class="cards">
  <div class="card"><div class="card-label" data-i18n="summary_invested">총 투자금액</div><div class="card-val" id="cInvested">—</div><div class="card-sub" data-i18n="basis_buy">매수가 기준</div></div>
  <div class="card"><div class="card-label" data-i18n="summary_current">현재 평가금액</div><div class="card-val" id="cCurrent">—</div><div class="card-sub" data-i18n="basis_market">시장가 기준</div></div>
  <div class="card"><div class="card-label" data-i18n="summary_pnl">총 손익</div><div class="card-val" id="cPnl">—</div><div class="card-sub" data-i18n="unrealized_pnl">미실현 손익</div></div>
  <div class="card"><div class="card-label" data-i18n="summary_return">수익률</div><div class="card-val" id="cRet">—</div><div class="card-sub" data-i18n="entire_portfolio">전체 포트폴리오</div></div>
</div>

<!-- Add Form -->
<div class="add-form">
  <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;" data-i18n="add_title">종목 추가</div>
  <div class="form-row">
    <div class="fg"><label data-i18n="label_ticker">종목 코드</label><input id="inTicker" placeholder="AAPL / 005930" /></div>
    <div class="fg"><label data-i18n="label_currency">통화</label>
      <select id="inCurrency">
        <option value="USD" data-i18n="opt_usd">🇺🇸 달러 (USD)</option>
        <option value="KRW" data-i18n="opt_krw">🇰🇷 원화 (KRW)</option>
      </select>
    </div>
    <div class="fg"><label data-i18n="label_account">계좌</label>
      <select id="inAccount">
        <option value="" data-i18n="opt_no_account">계좌 없음</option>
      </select>
    </div>
    <div class="fg"><label data-i18n="label_price">매수가</label><input id="inPrice" type="number" placeholder="Price" /></div>
    <div class="fg"><label data-i18n="label_shares">수량 (주)</label><input id="inShares" type="number" placeholder="Shares" /></div>
    <button class="btn" id="addBtn" onclick="addHolding()" data-i18n="btn_add">+ 추가</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
    <label style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;font-family:'Space Mono',monospace;" data-i18n="label_account">계좌</label>
    <input id="inAccountName" style="width:150px;" placeholder="키움 / 미래에셋" />
    <button class="btn-sm" onclick="addAccount()">+ 추가</button>
    <div id="accountTags" style="display:flex;flex-wrap:wrap;gap:5px;"></div>
  </div>
  <div class="hint">💡 미국: AAPL · TSLA · NVDA &nbsp;|&nbsp; 한국: 005930 · 035420 · 000660</div>
</div>

<!-- Main -->
<div class="main-grid">

  <!-- Chart -->
  <div class="chart-card">
    <div class="sec-hdr">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="sec-title" id="chartTitle" data-i18n="chart_asset">자산 추이</div>
        <div class="tabs">
          <button class="tab active" id="tabA" onclick="switchMode('asset')" data-i18n="tab_asset">자산</button>
          <button class="tab" id="tabR" onclick="switchMode('return')" data-i18n="tab_return">수익률</button>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <input type="date" id="dStart" style="font-size:10px;padding:4px 8px;width:120px;">
        <span style="color:var(--text3);font-size:10px;">—</span>
        <input type="date" id="dEnd" style="font-size:10px;padding:4px 8px;width:120px;">
        <button class="btn-sm" onclick="loadChart()" data-i18n="btn_load">조회</button>
      </div>
    </div>
    <div id="chartAccFilter" style="display:none;flex-wrap:wrap;gap:6px;margin-bottom:12px;"></div>

    <!-- Slider Panel -->
    <div class="slider-panel" id="sliderPanel">
      <div class="slider-date" id="sliderDate">—</div>
      <div class="slider-stats" id="sliderStats"></div>
      <div class="stock-chips" id="sliderChips"></div>
      <div class="slider-wrap">
        <input type="range" id="dateSlider" min="0" max="0" value="0" oninput="onSlider(this.value)">
        <div class="slider-labels"><span id="slMin">—</span><span id="slMax">—</span></div>
      </div>
    </div>

    <div id="chartArea"><div class="empty" data-i18n="empty_chart">종목을 추가하면<br>그래프가 표시됩니다</div></div>
    <canvas id="mainChart" style="display:none;"></canvas>
    <div id="chartTooltip" class="chart-tooltip"></div>
  </div>

  <!-- Holdings -->
  <div class="holdings-card">
    <div class="sec-hdr">
      <div class="sec-title" data-i18n="holdings_title">보유 종목</div>
      <button class="btn-sm" onclick="refreshPrices()"><span id="refIcon">↻</span> <span data-i18n="btn_refresh">새로고침</span></button>
    </div>
    <div id="holdAccountTabs" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;"></div>
    <div class="holdings-list" id="holdList"><div class="empty" style="padding:40px 10px;" data-i18n="empty_holdings">아직 추가된 종목이 없습니다</div></div>
  </div>
</div>

<!-- Bottom -->
<div class="bottom-grid">
  <div class="chart-card">
    <div class="sec-hdr"><div class="sec-title" data-i18n="allocation_title">비중 배분</div></div>
    <div style="display:grid;grid-template-columns:160px 1fr;gap:16px;align-items:center;">
      <div style="width:160px;height:160px;"><canvas id="donut"></canvas></div>
      <div id="allocList"><div style="color:var(--text3);font-size:11px;font-family:'Space Mono',monospace;" data-i18n="empty_after_add">종목 추가 후 표시</div></div>
    </div>
  </div>
  <div class="chart-card">
    <div class="sec-hdr"><div class="sec-title" data-i18n="pnl_by_asset">종목별 손익률</div></div>
    <div id="barWrap"><div class="empty" style="padding:30px 0;" data-i18n="empty_after_add">종목 추가 후 표시</div></div>
    <canvas id="barChart" style="display:none;max-height:180px;"></canvas>
  </div>
</div>

</div>
<div class="toast" id="toast"></div>

<!-- Login Modal -->
<div class="modal-overlay" id="loginModal" style="display:none;" onclick="if(event.target===this)closeLoginModal()">
  <div class="modal-box">
    <div class="modal-title" data-i18n="login_title">클라우드 동기화</div>
    <div class="modal-desc" data-i18n="login_desc">로그인하면 데이터가 클라우드에 저장되어 기기 간 동기화가 가능합니다.</div>
    <button class="btn-google" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908C16.658 14.333 17.64 12.025 17.64 9.2z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      <span data-i18n="login_google">Google로 로그인</span>
    </button>
    <div class="modal-or"><span data-i18n="or">또는</span></div>
    <div class="fg" style="margin-bottom:10px;">
      <label data-i18n="label_email">이메일</label>
      <input id="authEmail" type="email" placeholder="email@example.com">
    </div>
    <div class="fg" style="margin-bottom:8px;">
      <label data-i18n="label_password">비밀번호</label>
      <input id="authPassword" type="password" placeholder="Password">
    </div>
    <div id="authError" style="font-size:11px;color:var(--red);min-height:18px;margin-bottom:10px;font-family:'Space Mono',monospace;word-break:break-all;"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn" style="flex:1" onclick="loginWithEmail()" data-i18n="login_btn">로그인</button>
      <button class="btn-sm" style="flex:1;padding:9px;" onclick="signupWithEmail()" data-i18n="signup_btn">회원가입</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script src="main.js"></script>
</body>
</html>
